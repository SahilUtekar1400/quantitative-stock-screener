name: Daily Market Data Extraction

# This tells GitHub WHEN to run the script
on:
  schedule:
    # Runs at 12:00 PM UTC (5:30 PM IST) Monday-Friday
    - cron: '0 12 * * 1-5'
  
  # This allows you to click a button on GitHub to run it manually right now
  workflow_dispatch:

jobs:
  update-database:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Extraction Script
        # This securely injects your secret database URL into the script
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python market_fetcher.py